<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurum - Core Data</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            height: 100vh; 
            box-sizing: border-box; 
        }
        .chart-container { flex: 7; border: 1px solid #333; transition: 0.3s; }
        .data-container { flex: 3; padding-left: 20px; display: flex; flex-direction: column; transition: 0.3s; }
        
        .panel { 
            background-color: #111; 
            border: 1px solid #444; 
            padding: 15px; 
            margin-bottom: 15px; 
        }
        
        h2 { margin-top: 0; font-size: 18px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        .data-value { font-weight: bold; font-family: monospace; font-size: 18px; }
        
        .signal-box { 
            padding: 15px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 15px;
            border: 2px solid #555;
        }
        
        .color-buy { color: #00ff00; }
        .color-sell { color: #ff3333; }
        .color-wait { color: #ffff00; }

        .btn { 
            background-color: #333; 
            color: white; 
            border: 1px solid #555; 
            padding: 15px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            width: 100%;
            margin-bottom: 10px;
        }
        .btn:hover { background-color: #444; }
        
        .btn-stealth {
            background-color: #1a1a1a;
            color: #888;
            border: 1px dashed #444;
        }
        .btn-stealth:hover { background-color: #222; color: #fff; }
    </style>
</head>
<body>

    <!-- ฝั่งซ้าย: กราฟ -->
    <div class="chart-container" id="chartSection">
        <div id="tv_chart_container" style="height: 100%;"></div>
    </div>

    <!-- ฝั่งขวา: ข้อมูลดิบ -->
    <div class="data-container" id="dataSection">
        
        <!-- ปุ่ม Stealth Mode ซ่อนกราฟ -->
        <button class="btn btn-stealth" id="btnToggleChart" onclick="toggleChart()">🙈 ซ่อนกราฟ (Stealth Mode)</button>

        <!-- ปุ่มดึงข้อมูล AI -->
        <button class="btn" id="btnAnalyze" onclick="fetchData()">⚡ กดเพื่อดึงข้อมูล AI ล่าสุด</button>
        
        <div id="signalDisplay" class="signal-box">
            รอการเชื่อมต่อ...
        </div>

        <div class="panel">
            <h2>MARKET DATA</h2>
            <div class="data-row"><span>ราคาปัจจุบัน:</span> <span class="data-value" id="currentPrice">-</span></div>
            <div class="data-row"><span>RSI (14):</span> <span class="data-value" id="currentRsi">-</span></div>
        </div>

        <div class="panel" style="border-color: #aaa;">
            <h2>ACTION ZONES (แผนการเทรด)</h2>
            <div class="data-row"><span>🎯 จุดเข้า (Entry):</span> <span class="data-value color-buy" id="zoneEntry">-</span></div>
            <div class="data-row"><span>⏳ จุดรอ (Wait):</span> <span class="data-value color-wait" id="zoneWait">-</span></div>
            <div class="data-row"><span>🚀 เป้าหมาย (Target):</span> <span class="data-value color-buy" id="zoneTarget">-</span></div>
            <hr style="border: 0.5px solid #333; margin: 10px 0;">
            <div class="data-row"><span>🛑 ตัดขาดทุน (SL):</span> <span class="data-value color-sell" id="zoneStop">-</span></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // โหลดกราฟ TradingView
        new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "15",
            "timezone": "Asia/Bangkok",
            "theme": "dark",
            "style": "1",
            "hide_top_toolbar": true,
            "container_id": "tv_chart_container"
        });

        // ฟังก์ชันซ่อน/แสดงกราฟ
        function toggleChart() {
            const chartSec = document.getElementById('chartSection');
            const btn = document.getElementById('btnToggleChart');
            
            if (chartSec.style.display === 'none') {
                chartSec.style.display = 'block';
                btn.innerHTML = '🙈 ซ่อนกราฟ (Stealth Mode)';
            } else {
                chartSec.style.display = 'none';
                btn.innerHTML = '👁️ แสดงกราฟ';
            }
        }

        // ฟังก์ชันดึงข้อมูลจาก AI (Colab)
        async function fetchData() {
            const btn = document.getElementById('btnAnalyze');
            btn.innerHTML = 'กำลังดึงข้อมูล...';
            
            try {
                // ==========================================
                // ⚠️ อย่าลืมแก้ลิงก์ Colab ของคุณตรงนี้นะครับ
                const ai_url = "https://xxxxxx.loca.lt/api/signal"; 
                // ==========================================

                const response = await fetch(ai_url);
                const data = await response.json();

                if(data.status === "success") {
                    document.getElementById('currentPrice').innerText = data.price.toFixed(2);
                    document.getElementById('currentRsi').innerText = data.rsi.toFixed(2);
                    
                    const sigBox = document.getElementById('signalDisplay');
                    sigBox.innerText = `SIGNAL: ${data.signal}`;
                    
                    if(data.signal === 'BUY') sigBox.style.borderColor = '#00ff00';
                    else if(data.signal === 'SELL') sigBox.style.borderColor = '#ff3333';
                    else sigBox.style.borderColor = '#ffff00';

                    // คำนวณจุดเข้า/ออก (จำลอง)
                    let price = data.price;
                    if(data.signal === 'BUY' || data.signal === 'WAIT') {
                        document.getElementById('zoneEntry').innerText = price.toFixed(2);
                        document.getElementById('zoneWait').innerText = (price - 3).toFixed(2) + " - " + (price - 5).toFixed(2);
                        document.getElementById('zoneTarget').innerText = (price + 15).toFixed(2);
                        document.getElementById('zoneStop').innerText = (price - 8).toFixed(2);
                    } else {
                        document.getElementById('zoneEntry').innerText = price.toFixed(2);
                        document.getElementById('zoneWait').innerText = (price + 3).toFixed(2) + " - " + (price + 5).toFixed(2);
                        document.getElementById('zoneTarget').innerText = (price - 15).toFixed(2);
                        document.getElementById('zoneStop').innerText = (price + 8).toFixed(2);
                    }

                } else {
                    alert("Error: " + data.message);
                }
            } catch (error) {
                alert("การเชื่อมต่อล้มเหลว ตรวจสอบลิงก์ Colab อีกครั้ง");
            }

            btn.innerHTML = '⚡ กดเพื่อดึงข้อมูล AI ล่าสุด';
        }
    </script>
</body>
</html>
